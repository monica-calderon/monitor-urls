name: Monitor URLs

on:
  workflow_dispatch:
    inputs:
      action_to_run:
        description: Action to run
        required: true
        default: normal
        type: choice
        options:
          - normal
          - debug
  repository_dispatch:
    types:
      - monitor-urls

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: monitor-urls
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 9

    steps:
      - name: Descargar el codigo
        uses: actions/checkout@v4

      - name: Preparar Python
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Restaurar estado anterior
        uses: actions/cache@v4
        with:
          path: .monitor_state
          key: monitor-state-${{ github.run_id }}
          restore-keys: |
            monitor-state-

      - name: Restaurar entorno Python
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-py${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('requirements.txt') }}

      - name: Restaurar Chromium de Playwright
        id: cache-playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-py${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('requirements.txt') }}

      - name: Instalar dependencias
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -r requirements.txt

      - name: Instalar Chromium de Playwright
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: .venv/bin/python -m playwright install --with-deps chromium

      - name: Ejecutar monitor
        env:
          ACTION_TO_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.action_to_run || github.event.client_payload.action_to_run || 'normal' }}
          TZ: Europe/Madrid
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_ALLOWED_USER_ID: ${{ secrets.TELEGRAM_ALLOWED_USER_ID }}
          GH_SECRETS_PAT: ${{ secrets.GH_SECRETS_PAT }}
          MONITOR_URLS_JSON: ${{ secrets.MONITOR_URLS_JSON }}
          MONITOR_STATE_JSON: ${{ secrets.MONITOR_STATE_JSON }}
        run: .venv/bin/python monitor.py
